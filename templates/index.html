<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Swap Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sprocket-rail" aria-hidden="true"></div>

<header class="site-header">
  <div class="brand">
    <span class="brand-mark">⌗</span>
    <span class="brand-name">Face Swap <em>Studio</em></span>
  </div>
  <span class="brand-tag">developing&nbsp;identities, frame&nbsp;by&nbsp;frame</span>
</header>

<main>
  <section class="intro">
    <h1>Two rolls. One face.</h1>
    <p>Upload the original, upload the face you want printed onto it. Pick your medium below.</p>
  </section>

  <div class="tabs" role="tablist" aria-label="Swap medium">
    <button class="tab tab--image is-active" id="tab-image" role="tab" aria-selected="true">
      <span class="tab-index">01</span> Image
    </button>
    <button class="tab tab--video" id="tab-video" role="tab" aria-selected="false">
      <span class="tab-index">02</span> Video
    </button>
  </div>

  <!-- ============================ IMAGE PANEL ============================ -->
  <section class="panel is-active" id="panel-image" role="tabpanel" aria-labelledby="tab-image">
    <form id="form-image" class="swap-form">
      <div class="dropzone-grid">
        <div class="dropzone" data-for="image-original">
          <input type="file" id="image-original" name="original_image" accept=".jpg,.jpeg,.png,.webp,.bmp" required hidden>
          <label for="image-original">
            <span class="dz-eyebrow">Negative A</span>
            <span class="dz-title">Original photo</span>
            <span class="dz-hint">Click or drop · JPG, PNG, WEBP</span>
            <img class="dz-preview" alt="">
          </label>
        </div>
        <div class="dropzone-join" aria-hidden="true">+</div>
        <div class="dropzone" data-for="image-face">
          <input type="file" id="image-face" name="face_image" accept=".jpg,.jpeg,.png,.webp,.bmp" required hidden>
          <label for="image-face">
            <span class="dz-eyebrow">Negative B</span>
            <span class="dz-title">Face to insert</span>
            <span class="dz-hint">Clear, front-facing works best</span>
            <img class="dz-preview" alt="">
          </label>
        </div>
      </div>

      <label class="consent">
        <input type="checkbox" name="consent" required>
        <span>I have the right and consent of everyone pictured to combine these photos.</span>
      </label>

      <button type="submit" class="develop-btn">
        <span>Develop image</span>
      </button>

      <p class="form-error" id="image-error" hidden></p>
    </form>

    <div class="result" id="image-result" hidden>
      <h2>Result</h2>
      <img id="image-result-img" alt="Swapped result">
      <a id="image-download" class="download-link" download>Download PNG</a>
    </div>
  </section>

  <!-- ============================ VIDEO PANEL ============================ -->
  <section class="panel" id="panel-video" role="tabpanel" aria-labelledby="tab-video" hidden>
    <form id="form-video" class="swap-form">
      <div class="dropzone-grid">
        <div class="dropzone" data-for="video-original">
          <input type="file" id="video-original" name="original_video" accept=".mp4,.mov,.mkv,.avi,.webm" required hidden>
          <label for="video-original">
            <span class="dz-eyebrow">Reel A</span>
            <span class="dz-title">Original video</span>
            <span class="dz-hint">Click or drop · MP4, MOV, MKV</span>
            <video class="dz-preview" muted playsinline controls></video>
          </label>
        </div>
        <div class="dropzone-join" aria-hidden="true">+</div>
        <div class="dropzone" data-for="video-face">
          <input type="file" id="video-face" name="face_image" accept=".jpg,.jpeg,.png,.webp,.bmp" required hidden>
          <label for="video-face">
            <span class="dz-eyebrow">Negative</span>
            <span class="dz-title">Face to insert</span>
            <span class="dz-hint">One clear, front-facing photo</span>
            <img class="dz-preview" alt="">
          </label>
        </div>
      </div>

      <label class="consent">
        <input type="checkbox" name="consent" required>
        <span>I have the right and consent of everyone pictured to combine these clips.</span>
      </label>

      <button type="submit" class="develop-btn">
        <span>Develop video</span>
      </button>

      <p class="form-error" id="video-error" hidden></p>
    </form>

    <div class="progress-wrap" id="video-progress" hidden>
      <div class="reel-track"><div class="reel-fill" id="reel-fill"></div></div>
      <p class="progress-label"><span id="progress-pct">0</span>% · <span id="progress-status">queued</span></p>
    </div>

    <div class="result" id="video-result" hidden>
      <h2>Result</h2>
      <video id="video-result-player" controls></video>
      <a id="video-download" class="download-link" download>Download MP4</a>
    </div>
  </section>
</main>

<footer class="site-footer">
  <p>Created By Shayan Solutions</p>
</footer>

<script src="/static/script.js"></script>
</body>
</html>
